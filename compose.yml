services:
  frontend:
    build:
      context: frontend
    restart: always
    networks:
      - notes-app
    container_name: frontend

  backend:
    build:
      context: backend
    restart: always
    networks:
      - notes-app
    container_name: backend

  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
    ports:
      - 3000:80
    networks:
      - notes-app
    depends_on:
      - frontend
      - backend
    container_name: nginx

networks:
  notes-app:
